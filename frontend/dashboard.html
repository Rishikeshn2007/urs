<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - URL Shortener</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .dashboard-wrapper {
            width: 100%;
            max-width: 500px;
        }

        .dashboard-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .header-section h1 {
            color: #1a1a2e;
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .welcome-message {
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
        }

        .info-section {
            margin: 35px 0;
        }

        .info-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #eff1f5 100%);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .info-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .info-label {
            color: #999;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .info-value {
            color: #1a1a2e;
            font-size: 16px;
            font-weight: 600;
            word-break: break-all;
            font-family: 'Courier New', monospace;
        }

        .loading {
            text-align: center;
            padding: 30px 20px;
        }

        .spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading p {
            color: #667eea;
            font-size: 14px;
            font-weight: 500;
        }

        .actions-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 35px;
        }

        button {
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: 1 / -1;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #1a1a2e;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f44336 0%, #e91e63 100%);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(244, 67, 54, 0.4);
        }

        /* Status Badge */
        .status-badge {
            display: inline-block;
            background: linear-gradient(135deg, #43e97b 0%, #38ada9 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            margin-top: 5px;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .dashboard-card {
                padding: 25px;
                border-radius: 16px;
            }

            .header-section {
                margin-bottom: 30px;
            }

            .avatar {
                width: 70px;
                height: 70px;
                font-size: 35px;
            }

            .header-section h1 {
                font-size: 24px;
            }

            .info-card {
                padding: 15px;
            }

            .info-label {
                font-size: 10px;
            }

            .info-value {
                font-size: 14px;
            }

            .actions-section {
                gap: 10px;
            }

            button {
                padding: 11px 14px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .dashboard-card {
                padding: 20px;
            }

            .header-section {
                margin-bottom: 25px;
            }

            .avatar {
                width: 60px;
                height: 60px;
                font-size: 30px;
                margin-bottom: 15px;
            }

            .header-section h1 {
                font-size: 22px;
            }

            .welcome-message {
                font-size: 12px;
            }

            .info-section {
                margin: 25px 0;
            }

            .info-card {
                padding: 12px;
                margin-bottom: 12px;
                border-left-width: 3px;
            }

            .info-label {
                font-size: 9px;
                margin-bottom: 5px;
            }

            .info-value {
                font-size: 13px;
            }

            .actions-section {
                grid-template-columns: 1fr;
                gap: 8px;
                margin-top: 25px;
            }

            .btn-primary {
                grid-column: auto;
                order: -1;
            }

            button {
                padding: 10px 12px;
                font-size: 12px;
                gap: 6px;
            }
        }

        @media (max-width: 380px) {
            .dashboard-card {
                padding: 18px;
            }

            .header-section h1 {
                font-size: 20px;
            }

            .welcome-message {
                font-size: 11px;
            }

            .info-value {
                font-size: 12px;
            }

            button {
                padding: 9px 10px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <div class="dashboard-card">
            <div class="header-section">
                <div class="avatar">👤</div>
                <h1>Welcome Back!</h1>
                <p class="welcome-message" id="welcomeMessage">Loading...</p>
            </div>

            <div id="loadingState" class="loading">
                <div class="spinner"></div>
                <p>Loading your profile...</p>
            </div>

            <div id="userInfo" style="display: none;">
                <div class="info-section">
                    <div class="info-card">
                        <div class="info-label">📧 Email Address</div>
                        <div class="info-value" id="userEmail"></div>
                    </div>

                    <div class="info-card">
                        <div class="info-label">✅ Account Status</div>
                        <div class="info-value">
                            Active <span class="status-badge">Verified</span>
                        </div>
                    </div>

                    <div class="info-card">
                        <div class="info-label">🕐 Login Time</div>
                        <div class="info-value" id="loginTime"></div>
                    </div>
                </div>
            </div>

            <div class="actions-section">
                <button class="btn-primary" onclick="goToUrlManager()">🔗 URL Manager</button>
                <button class="btn-secondary" onclick="goHome()">🏠 Home</button>
                <button class="btn-danger" onclick="logout()">🚪 Logout</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetch('/users/profile', {
                method: 'GET',
                credentials: 'include'
            })
            .then(response => {
                if (!response.ok) {
                    window.location.href = '/login';
                    return;
                }
                return response.json();
            })
            .then(data => {
                if (data && data.email) {
                    setTimeout(() => {
                        document.getElementById('loadingState').style.display = 'none';
                        document.getElementById('userInfo').style.display = 'block';
                        document.getElementById('welcomeMessage').textContent = `Welcome, ${data.email}!`;
                        document.getElementById('userEmail').textContent = data.email;
                        document.getElementById('loginTime').textContent = new Date().toLocaleString();
                    }, 500);
                } else {
                    window.location.href = '/login';
                }
            })
            .catch(error => {
                console.error('Error fetching user profile:', error);
                window.location.href = '/login';
            });
        });

        function logout() {
            fetch('/logout', {
                method: 'POST',
                credentials: 'include'
            })
            .then(() => {
                alert('✓ Logged out successfully!');
                window.location.href = '/';
            })
            .catch(() => {
                window.location.href = '/';
            });
        }

        function goHome() {
            window.location.href = '/';
        }

        function goToUrlManager() {
            window.location.href = '/users/url-manager';
        }
    </script>
</body>
</html>
